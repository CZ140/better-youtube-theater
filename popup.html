<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      margin: 0;
      padding: 14px 16px 16px;
      background: #0f0f0f;
      color: #f1f1f1;
      font: 13px/1.5 "Segoe UI", sans-serif;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 10px;
    }
    fieldset {
      border: 0;
      margin: 0 0 10px;
      padding: 0;
    }
    legend {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aaa;
      padding: 0 0 4px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      cursor: pointer;
    }
    input {
      accent-color: #f03;
      margin: 0;
    }
    .hint {
      color: #aaa;
      font-size: 11px;
      margin: 4px 0 0;
    }
  </style>
</head>
<body>
  <h1>Better YouTube Theater</h1>
  <fieldset>
    <legend>Default sidebar</legend>
    <label><input type="radio" name="sidebar" value="recs"> Recommendations</label>
    <label><input type="radio" name="sidebar" value="chat"> Live chat (streams)</label>
    <label><input type="radio" name="sidebar" value="closed"> Closed</label>
  </fieldset>
  <fieldset>
    <legend>Ambient glow</legend>
    <label><input type="checkbox" id="ambient"> Inset video to show glow</label>
    <p class="hint">Needs YouTube's dark theme + Ambient Mode turned on in the player settings.</p>
  </fieldset>
  <script src="popup.js"></script>
</body>
</html>
